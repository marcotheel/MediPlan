<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#00a99d">
  <meta name="description" content="MediPlan – Medikamenten- und Gesundheitsverwaltung">
  <title>MediPlan</title>

  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="assets/icons/icon-32.png" sizes="32x32">
  <link rel="apple-touch-icon" href="assets/icons/icon-180.png">
  <link rel="stylesheet" href="css/design-system/tokens.css">
  <link rel="stylesheet" href="css/design-system/components.css">
  <link rel="stylesheet" href="css/design-system/icons.css">
  <link rel="stylesheet" href="css/design-system/motion.css">
  <link rel="stylesheet" href="css/design-system/accessibility.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/light.css">
  <link rel="stylesheet" href="css/dark.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/navigation.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <div id="app" class="app-shell">
    <header class="app-header">
      <button id="menuButton" class="square-button" type="button" aria-label="Menü öffnen">☰</button>

      <div class="brand">
        <div class="brand-logo"><img src="assets/brand/mediplan-mark.svg" alt=""></div>
        <div>
          <span class="brand-name">MediPlan</span>
          <h1 id="pageTitle">Guten Morgen, Mama 👋</h1>
          <p id="todayLabel"></p>
        </div>
      </div>

      <button id="themeButton" class="square-button" type="button" aria-label="Darstellung wechseln">🌙</button>
    </header>

    <main id="mainContent">
      <section id="view-dashboard" class="view active-view"></section>
      <section id="view-intakes" class="view"></section>
      <section id="view-cabinet" class="view"></section>
      <section id="view-calendar" class="view"></section>
      <section id="view-more" class="view"></section>
      <section id="view-emergency" class="view"></section>
      <section id="view-admin-login" class="view"></section>
      <section id="view-admin" class="view"></section>
      <section id="view-import" class="view"></section>
      <section id="view-settings" class="view"></section>
      <section id="view-documents" class="view"></section>
    </main>

    <div id="modalRoot"></div>
    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <nav class="bottom-nav" aria-label="Hauptnavigation">
      <button class="nav-button active" data-route="dashboard">
        <svg class="mds-icon" aria-hidden="true"><use href="assets/icons/ui-icons.svg#icon-home"></use></svg>
        <small>Start</small>
      </button>
      <button class="nav-button" data-route="intakes">
        <svg class="mds-icon" aria-hidden="true"><use href="assets/icons/ui-icons.svg#icon-pill"></use></svg>
        <small>Einnahmen</small>
      </button>
      <button class="nav-button" data-route="cabinet">
        <svg class="mds-icon" aria-hidden="true"><use href="assets/icons/ui-icons.svg#icon-box"></use></svg>
        <small>Schrank</small>
      </button>
      <button class="nav-button" data-route="calendar">
        <svg class="mds-icon" aria-hidden="true"><use href="assets/icons/ui-icons.svg#icon-calendar"></use></svg>
        <small>Kalender</small>
      </button>
      <button class="nav-button" data-route="more">
        <svg class="mds-icon" aria-hidden="true"><use href="assets/icons/ui-icons.svg#icon-menu"></use></svg>
        <small>Mehr</small>
      </button>
    </nav>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

  <script src="js/core/storage.js"></script>
  <script src="js/core/data.js"></script>
  <script src="js/core/ui.js"></script>
  <script src="js/core/router.js"></script>
  <script src="js/core/document-storage.js"></script>

  <script src="js/modules/dashboard.js"></script>
  <script src="js/modules/intakes.js"></script>
  <script src="js/modules/cabinet.js"></script>
  <script src="js/modules/calendar.js"></script>
  <script src="js/modules/more.js"></script>
  <script src="js/modules/emergency.js"></script>
  <script src="js/modules/admin.js"></script>
  <script src="js/modules/importer.js"></script>
  <script src="js/modules/settings.js"></script>
  <script src="js/modules/documents.js"></script>

  <script src="js/components/components.js"></script>
  <script src="js/utils/validators.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
